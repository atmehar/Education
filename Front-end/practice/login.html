<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url("8275340.jpg");
            background-size: cover;
            background-position: center;
        }
        .wrapper {
            width: 420px;
            background: transparent;
            border: 2px solid rgba(0, 0, 0, .1);
            backdrop-filter: blur(20px);
            color: #fff;
            border-radius: 20px;
            padding: 30px 40px;
        }
        .wrapper h1 { 
            text-align: center;
            font-size: 36px;
        }
        .wrapper .input-box {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 30px 0;
            font-weight: 600;
        }
        .input-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            border: 2px solid rgba(255 , 255, 255, .2);
            border-radius: 40px;
            color: white;
            font-size: 16px;
            padding: 20px, 45px, 20px, 20px;
        }
        .input-box input::placeholder{
            color: #fff; 
            padding-left: 20px;
        }
        .wrapper .remember-me{
            display: flex;
            justify-content: space-between;
            font-size: 14.5px;
            margin: -15px 0 15px;
        }
        .remember-me label input {
            accent-color: #fff;
            margin-right: 3px;
        }
        .remember-me a {
            color: #fff;
            text-decoration: none;
        }
        .remember-me a:hover{
            text-decoration: underline;
        }
        .wrapper .btn{
            width: 100%;
            height: 45px;
            background: #fff;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .1);
            cursor: pointer;
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }
        .wrapper .register{
            font-size: 14.5px;
            text-align: center;
            margin-top: 20px;
        }
        .register p a{
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        .register p a:hover{
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="wrapper">
        <form action="">
            <h1>Login</h1>
            <div class="input-box">
                <input type="email" id="id_email" name="email" value="{{ initial.email }}" placeholder="Email" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="password" required>
            </div>
            <div class="remember-me">
                <label><input type="checkbox">Remember me</label>
                <a href="#">Forget password</a>
            </div>
            <Button type="submit" class="btn">Login</Button>
            <div class="register">
                <p>Don't Have an account! <a href="#">Register</a></p>
            </div>
        </form>
    </div>
</body>
</html>
