{% extends "base.html" %}
{% load static %}

{% block title %}Register{% endblock %}

{% block content %}
<style>
    body {
        background-image: url("{% static 'images/8275340.jpg' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }
</style>

{% if errors %}
    <ul class="error-list">
        {% for error in errors %}
            <li>{{ error }}</li>
        {% endfor %}
    </ul>
{% endif %}

<form method="POST">
    {% csrf_token %}
    <h2 style="color: black; text-align: center; margin-bottom: 20px;">Register</h2>
    <p>
        <label for="id_full_name">Full name:</label><br>
        <input type="text" id="id_full_name" name="full_name" value="{{ initial.full_name }}" required>
    </p>
   
    <p>
        <label for="id_email">Email:</label><br>
        <input type="email" id="id_email" name="email" value="{{ initial.email }}" required>
    </p>
    <p>
        <label for="id_password1">Password:</label><br>
        <input type="password" id="id_password1" name="password1" required>
    </p>
    <p>
        <label for="id_password2">Confirm password:</label><br>
        <input type="password" id="id_password2" name="password2" required>
    </p>
    <button type="submit">Register</button>
    <p class="already-have-account">Already have an account?
        <a class="register" href="{% url 'login' %}">Login</a>
    </p>
</form>


{% endblock %}
