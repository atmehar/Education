{% extends "base.html" %}

{% block title %}Delete Blog{% endblock %}

{% block content %}
<h2>Delete Blog Post</h2>

<p>Are you sure you want to delete "<strong>{{ blog.title }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<p>
    <a href="{% url 'blog_detail' slug=blog.slug %}">Cancel</a>
</p>

{% endblock %}
