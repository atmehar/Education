<!DOCTYPE html>
<html>

<head>
    <title>User API Frontend</title>
    <style>
        body {
            font-family: Arial;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 10px;
        }

        .navbar button {
            color: white;
            background: #555;
            border: none;
            padding: 10px;
            margin-right: 10px;
            cursor: pointer;
        }
        .navbar button:hover{
            text-decoration: underline;
            color: black;
            font-weight: 600;
            background-color: aliceblue;
        }

        .container {
            padding: 20px;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 8px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div style="color: azure;">
            <h1>Practice Task</h1>
        </div>
        <div>
            <button onclick="getUsers()">GET Users</button>
            <button onclick="showForm()">POST User</button>
        </div>
    </div>

    <div class="container" id="content">
        <h2>Welcome</h2>
        <p>This is a Practice Task</p>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function apiFetch(url, options = {}) {
            const headers = options.headers || {};
            return fetch(url, {
                ...options,
                headers: {
                    ...headers,
                    'X-CSRFToken': getCookie('csrftoken')
                },
                credentials: 'same-origin'
            }).then(async response => {
                let data = null;
                const contentType = response.headers.get('content-type') || '';
                if (contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    data = await response.text();
                }

                if (!response.ok) {
                    const msg = (data && data.detail) ? data.detail : (typeof data === 'string' ? data : JSON.stringify(data));
                    throw new Error(msg || `Request failed (${response.status})`);
                }
                return data;
            });
        }

        // GET USERS
        function getUsers() {
            fetch('http://127.0.0.1:8000/api/users/')
                .then(response => response.json())
                .then(data => {
                    let html = "<h2>Users List</h2>";

                    data.forEach(user => {
                        html += `
                <p style="margin-bottom: 6px;">
                    <b>Name:</b> ${user.name} <br>
                    <b>Email:</b> ${user.email} <br>
                    <b>Age:</b> ${user.age}
                </p>
                <button onclick="showEditForm(${user.id})">Edit</button>
                <button onclick="deleteUser(${user.id})">Delete</button>
                <hr>
            `;
                    });

                    document.getElementById("content").innerHTML = html;
                });
        }


        // SHOW FORM
        function showForm() {
            let formHTML = `
        <h2>Add User</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="email" id="email" placeholder="Email">
        <input type="number" id="age" placeholder="Age">
        <button onclick="addUser()">Submit</button>
    `;

            document.getElementById("content").innerHTML = formHTML;
        }

        function showEditForm(userId) {
            apiFetch(`http://127.0.0.1:8000/api/users/${userId}/`, { method: 'GET' })
                .then(user => {
                    const formHTML = `
                <h2>Edit User (ID: ${user.id})</h2>
                <input type="text" id="edit-name" placeholder="Name" value="${user.name ?? ''}">
                <input type="email" id="edit-email" placeholder="Email" value="${user.email ?? ''}">
                <input type="number" id="edit-age" placeholder="Age" value="${user.age ?? ''}">
                <button onclick="updateUser(${user.id})">Update</button>
                <button onclick="getUsers()">Cancel</button>
            `;
                    document.getElementById("content").innerHTML = formHTML;
                })
                .catch(err => alert("Failed to load user: " + err.message));
        }

        function updateUser(userId) {
            const userData = {
                name: document.getElementById("edit-name").value,
                email: document.getElementById("edit-email").value,
                age: document.getElementById("edit-age").value
            };

            apiFetch(`http://127.0.0.1:8000/api/users/${userId}/`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            })
                .then(() => {
                    alert("User Updated!");
                    getUsers();
                })
                .catch(err => alert("Failed to update user: " + err.message));
        }

        function deleteUser(userId) {
            if (!confirm("Are you sure you want to delete this user?")) return;

            apiFetch(`http://127.0.0.1:8000/api/users/${userId}/`, {
                method: 'DELETE'
            })
                .then(() => {
                    alert("User Deleted!");
                    getUsers();
                })
                .catch(err => alert("Failed to delete user: " + err.message));
        }


        // POST USER
        function addUser() {

            const userData = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                age: document.getElementById("age").value
            };

            apiFetch('http://127.0.0.1:8000/api/users/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(userData)
            })
                .then(data => {
                    alert("User Added!");
                    getUsers(); // refresh list
                })
                .catch(error => {
                    alert("Failed to add user: " + error.message);
                });
        }

    </script>

</body>

</html>
