{% extends "app1/base.html" %}

{% block title %} Contact 
{% endblock title %}

{% block body %}
<style>
    .contact-banner {
        background-image: url('/static/contact-us.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 33vh;
        min-height: 200px;
    }
    .contact-form-section {
        background: white;
        padding: 3rem 2rem;
        margin-top: 0;
    }
    .contact-form-section h2 {
        font-size: 2rem;
        font-weight: bold;
        color: black;
        text-align: center;
        margin-bottom: 2rem;
    }
    .contact-form-section form {
        max-width: 500px;
        margin: 0 auto;
    }
    .contact-form-section .form-group {
        margin-bottom: 1.25rem;
    }
    .contact-form-section label {
        display: block;
        color: black;
        font-weight: 500;
        margin-bottom: 0.35rem;
    }
    .contact-form-section input,
    .contact-form-section textarea {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        background: white;
        color: #333;
    }
    .contact-form-section input::placeholder,
    .contact-form-section textarea::placeholder {
        color: #adb5bd;
    }
    .contact-form-section .btn-submit {
        display: block;
        margin: 1.5rem auto 0;
        padding: 0.5rem 2rem;
        background: #0d6efd;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 500;
    }
</style>
    <div class="container-fluid px-0">
        <div class="contact-banner"></div>
        <div class="contact-form-section">
            <h2>Contact us</h2>
            <form method="post" action="{% url 'contact' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="name">Enter Your Name</label>
                    <input type="text" id="name" name="Name" placeholder="Enter Your Name">
                </div>
                <div class="form-group">
                    <label for="email">Enter Your Email</label>
                    <input type="email" id="email" name="Email" placeholder="Enter Your Email">
                </div>
                <div class="form-group">
                    <label for="phone">Enter Your Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter Your Number">
                </div>
                <div class="form-group">
                    <label for="message">Tell me about why you want to contact me</label>
                    <textarea id="message" name="desc" rows="4" placeholder="Tell me why you want to contact me"></textarea>
                </div>
                <button class="btn-submit" type="submit">submit</button>
            </form>
        </div>
    </div>
{% endblock body %}
